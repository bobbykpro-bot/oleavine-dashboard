
    <!-- YouTube API Integration -->
    <script>
        // YouTube API Key - Read-only access
        const YOUTUBE_API_KEY = 'AIzaSyALQWpu1-MLonEDjsKacniNwzIqPCe_YUQ';
        
        // Fetch YouTube Stats on Load
        async function updateYouTubeStats() {
            try {
                const channelId = 'UCGR44NA1GxMwBUy7qiHg3RQ'; // @OleavineTheratree
                const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelId}&key=${YOUTUBE_API_KEY}`);
                const data = await response.json();
                
                if (data.items && data.items[0]) {
                    const stats = data.items[0].statistics;
                    const subs = parseInt(stats.subscriberCount);
                    const videos = parseInt(stats.videoCount);
                    const views = parseInt(stats.viewCount);
                    
                    console.log('✅ YouTube live data:', { subs, videos, views });
                }
            } catch (error) {
                console.error('YouTube API error:', error);
            }
        }
        
        // Call when page loads
        updateYouTubeStats();
    </script>
